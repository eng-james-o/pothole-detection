services:
  - type: web
    name: pothole-detection-api
    env: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r deployment/requirements.txt
    startCommand: uvicorn deployment.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: MODEL_CONFIG_PATH
        value: deployment/model_config.yaml
      - key: INFERENCE_CONF
        value: "0.25"
      - key: INFERENCE_IOU
        value: "0.45"
      - key: MAX_IMAGE_BYTES
        value: "8000000"
      - key: YOLO_CONFIG_DIR
        value: "/tmp/Ultralytics"
      - key: MODEL_CACHE_DIR
        value: "/tmp/models"
